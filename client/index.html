<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Command Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --accent: #06B6D4;
            --accent-light: #0EA5E9;
            --bg-base: #F8FAFC;
            --bg-secondary: #F1F5F9;
            --text-primary: #0F172A;
            --text-secondary: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #root {
            min-height: 100%;
            height: auto;
            width: 100%;
            background-color: var(--bg-base);
        }

        @media (min-width: 1024px) {

            html,
            body,
            #root {
                height: 100%;
                overflow: hidden;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.08), 0 2px 8px 0 rgba(0, 0, 0, 0.04);
            will-change: backdrop-filter;
        }

        .glass-panel-dark {
            background: rgba(15, 23, 42, 0.90);
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
            border: 1px solid rgba(79, 70, 229, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            will-change: backdrop-filter;
        }

        .glass-glossy {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.2) 100%);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 12px 40px 0 rgba(79, 70, 229, 0.12), inset 0 0 20px rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            will-change: backdrop-filter;
        }

        .glass-glossy::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .glass-glossy:hover::after {
            left: 100%;
        }

        .command-gradient {
            background: linear-gradient(135deg, #F8FAFC 0%, #EEF2FF 50%, #F1F5F9 100%);
            position: relative;
        }

        .command-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .auth-gradient {
            background: linear-gradient(135deg, #1E1B4B 0%, #0F172A 50%, #1E293B 100%);
            position: relative;
        }

        .auth-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Starry Night Styles */
        .star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            box-shadow: 0 0 6px 1px rgba(79, 70, 229, 0.3);
            animation: twinkle var(--duration) infinite ease-in-out;
            will-change: transform, opacity;
            transform: translateZ(0); /* Hardware acceleration */
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.9;
                transform: scale(1.4);
            }
        }

        .shadow-glow-indigo {
            box-shadow: 0 0 30px -5px rgba(79, 70, 229, 0.4), 0 10px 20px -5px rgba(79, 70, 229, 0.2);
        }

        .shadow-glow-cyan {
            box-shadow: 0 0 30px -5px rgba(6, 182, 212, 0.4), 0 10px 20px -5px rgba(6, 182, 212, 0.2);
        }

        .tracking-tighter-custom {
            letter-spacing: -0.05em;
        }

        .uppercase-tracking {
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        /* Staggered Entry Animations */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-stagger {
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both;
            will-change: transform, opacity;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out both;
        }

        .animate-scale-in {
            animation: scaleIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        .delay-300 {
            animation-delay: 0.3s;
        }

        .delay-400 {
            animation-delay: 0.4s;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(79, 70, 229, 0.05);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4F46E5 0%, #4338CA 100%);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #4338CA 0%, #3730A3 100%);
        }
    </style>

{
  "imports": {
